Screens:
  Screen1:
    Properties:
      Fill: =clrBg
    Children:
      - AppHeader:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =clrSurface
            FillPortions: =0
            Height: =70
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingLeft: =16
            PaddingRight: =16
            Width: =Parent.Width
          Children:
            - lblAppTitle:
                Control: ModernText
                Properties:
                  Color: =clrAccent
                  FontWeight: =FontWeight.Bold
                  Size: =20
                  Text: ="Team Task Management"
            - lblUser:
                Control: Label
                Properties:
                  Color: =clrTextSecondary
                  Size: =13
                  Text: =varCurrentUser
      - ScreenContainer1:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =clrBg
            Height: =Parent.Height - AppHeader.Height
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =12
            LayoutOverflowY: =LayoutOverflow.Scroll
            PaddingBottom: =20
            PaddingLeft: =24
            PaddingRight: =24
            PaddingTop: =20
            Width: =Parent.Width
            Y: =AppHeader.Height
          Children:
            - SummaryCards:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =95
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                Children:
                  - cardTodo:
                      Control: ModernCard
                      Properties:
                        Title: ="Todo"
                        Subtitle: =Text(CountIf(colTasks, Status = "Todo"))
                        Width: =160
                  - cardInProgress:
                      Control: ModernCard
                      Properties:
                        Title: ="In Progress"
                        Subtitle: =Text(CountIf(colTasks, Status = "In Progress"))
                        Width: =160
                  - cardDone:
                      Control: ModernCard
                      Properties:
                        Title: ="Done"
                        Subtitle: =Text(CountIf(colTasks, Status = "Done"))
                        Width: =160
                  - cardTeamProgress:
                      Control: ModernCard
                      Properties:
                        Title: ="Team Completion"
                        Subtitle: =If(CountRows(colTasks)=0, "0%", Text(Round(CountIf(colTasks, Status = "Done")*100/CountRows(colTasks),0)) & "%")
                        Width: =220
            - FilterBar:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =44
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  LayoutAlignItems: =LayoutAlignItems.Center
                Children:
                  - txtSearch:
                      Control: ModernTextInput
                      Properties:
                        Default: =varSearchText
                        FillPortions: =2
                        OnChange: =Set(varSearchText, Self.Text)
                        Placeholder: ="Search task / assignee / project"
                  - ddStatusFilter:
                      Control: Dropdown
                      Properties:
                        Items: =colFilterStatuses
                        OnChange: =Set(varFilterStatus, Self.Selected.Value)
                  - ddPriorityFilter:
                      Control: Dropdown
                      Properties:
                        Items: =colFilterPriorities
                        OnChange: =Set(varFilterPriority, Self.Selected.Value)
                  - ddAssigneeFilter:
                      Control: Dropdown
                      Properties:
                        Items: =colFilterAssignees
                        OnChange: =Set(varFilterAssignee, Self.Selected.Value)
                  - ddProjectFilter:
                      Control: Dropdown
                      Properties:
                        Items: =colFilterProjects
                        OnChange: =Set(varFilterProject, Self.Selected.Value)
                  - ddDueFilter:
                      Control: Dropdown
                      Properties:
                        Items: =colFilterDueDays
                        OnChange: =Set(varFilterDueDays, Self.Selected.Value)
                  - btnNewTask:
                      Control: ModernButton
                      Properties:
                        BasePaletteColor: =clrAccent
                        Width: =120
                        Text: ="+ New Task"
                        OnSelect: |-
                          =Set(varEditTask, Blank());
                          Navigate(Screen2)
            - galTasks:
                Control: Gallery
                Variant: Vertical
                Properties:
                  Items: |-
                    =SortByColumns(
                      Filter(
                        colTasks,
                        (varFilterStatus = "All" || Status = varFilterStatus) &&
                        (varFilterPriority = "All" || Priority = varFilterPriority) &&
                        (varFilterAssignee = "All" || AssignedToName = varFilterAssignee) &&
                        (varFilterProject = "All" || ProjectName = varFilterProject) &&
                        (
                          varFilterDueDays = "All" ||
                          (varFilterDueDays = "Overdue" && DueDate < Today() && Status <> "Done") ||
                          (varFilterDueDays = "Next 7 days" && DueDate >= Today() && DueDate <= DateAdd(Today(), 7, TimeUnit.Days))
                        ) &&
                        (
                          IsBlank(varSearchText) ||
                          StartsWith(Lower(TaskName), Lower(varSearchText)) ||
                          StartsWith(Lower(AssignedToName), Lower(varSearchText)) ||
                          StartsWith(Lower(ProjectName), Lower(varSearchText))
                        )
                      ),
                      "DueDate", SortOrder.Ascending
                    )
                  TemplatePadding: =10
                  TemplateSize: =110
                Children:
                  - TaskCard:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =clrSurface
                        Height: =Parent.TemplateHeight - 10
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =10
                        PaddingLeft: =12
                        PaddingRight: =12
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Width: =Parent.TemplateWidth - 10
                      Children:
                        - TaskInfo:
                            Control: GroupContainer
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =2
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =2
                            Children:
                              - lblTaskName:
                                  Control: Label
                                  Properties:
                                    FontWeight: =FontWeight.Semibold
                                    Text: =ThisItem.TaskName
                              - lblMeta:
                                  Control: Label
                                  Properties:
                                    Color: =clrTextSecondary
                                    Size: =11
                                    Text: =ThisItem.ProjectName & " · " & ThisItem.Department & " · " & ThisItem.AssignedToName
                              - lblDue:
                                  Control: Label
                                  Properties:
                                    Color: =If(ThisItem.DueDate < Today() && ThisItem.Status <> "Done", clrDanger, clrTextSecondary)
                                    Size: =11
                                    Text: ="Due: " & Text(ThisItem.DueDate, "[$-en-US]yyyy-mm-dd")
                        - lblPriority:
                            Control: Label
                            Properties:
                              Text: =ThisItem.Priority
                        - lblStatus:
                            Control: Label
                            Properties:
                              Text: =ThisItem.Status
                        - btnEdit:
                            Control: ModernButton
                            Properties:
                              BasePaletteColor: =clrAccent
                              Width: =64
                              Text: ="Edit"
                              OnSelect: |-
                                =Set(varEditTask, ThisItem);
                                Navigate(Screen2)
