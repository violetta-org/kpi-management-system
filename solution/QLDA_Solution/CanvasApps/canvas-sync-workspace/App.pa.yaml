App:
  Properties:
    Formulas: |-
      =clrBg = RGBA(243, 242, 241, 1);
      clrSurface = RGBA(255, 255, 255, 1);
      clrSurface2 = RGBA(248, 249, 250, 1);
      clrAccent = RGBA(0, 120, 212, 1);
      clrAccentWarm = RGBA(216, 59, 1, 1);
      clrSuccess = RGBA(16, 124, 65, 1);
      clrDanger = RGBA(164, 38, 44, 1);
      clrTextPrimary = RGBA(50, 49, 48, 1);
      clrTextSecondary = RGBA(96, 94, 92, 1);
      clrBorder = RGBA(225, 223, 221, 1);
    OnStart: |-
      =Set(varCurrentUser, User().FullName);
      Set(varSelectedTab, "All");
      Set(varEditTask, Blank());
      Set(varSearchText, "");
      Set(varFilterStatus, "All");
      Set(varFilterPriority, "All");
      
      If(IsEmpty(colBuckets),
          ClearCollect(colBuckets,
              { Status: "Todo" },
              { Status: "In Progress" },
              { Status: "Done" }
          )
      );
      ClearCollect(colFilterStatuses, {Value: "All"});
      ForAll(colBuckets, Collect(colFilterStatuses, {Value: Status}));
      
      // Init collections if empty
      If(IsEmpty(colTasks),
          ClearCollect(colTasks,
              { Id: "task1", TaskName: "Setup environment", AssignedToName: varCurrentUser, Status: "Done", Priority: "High", DueDate: Today()-2, Description: "Install Node and PowerApps CLI", CreatedAt: Now()-3, CreatedBy: "Admin" },
              { Id: "task2", TaskName: "Design UI mockups", AssignedToName: "Violet", Status: "In Progress", Priority: "Medium", DueDate: Today()+1, Description: "Command center aesthetic", CreatedAt: Now()-2, CreatedBy: varCurrentUser },
              { Id: "task3", TaskName: "Integrate Dataverse", AssignedToName: varCurrentUser, Status: "Todo", Priority: "High", DueDate: Today()+5, Description: "Connect colTasks to cr_tasks", CreatedAt: Now()-1, CreatedBy: "Admin" }
          )
      );
      
      Set(varDetailTask, LookUp(colTasks, false));
      
      If(IsEmpty(colComments),
          ClearCollect(colComments,
              { Id: "com1", TaskId: "task1", CommentText: "Done! Ready for review.", CreatedBy: varCurrentUser, CreatedAt: Now()-1 },
              { Id: "com2", TaskId: "task2", CommentText: "Working on the color palette.", CreatedBy: "Violet", CreatedAt: Now() }
          )
      );
      If(IsEmpty(colAuditLog),
          ClearCollect(colAuditLog,
              { Id: "log1", TaskId: "task1", Action: "Status changed", ChangedBy: varCurrentUser, ChangedAt: Now()-2, OldValue: "In Progress", NewValue: "Done" },
              { Id: "log2", TaskId: "task2", Action: "Created", ChangedBy: varCurrentUser, ChangedAt: Now()-2, OldValue: "", NewValue: "Created" }
          )
      );
      If(IsEmpty(colAttachments),
          ClearCollect(colAttachments,
              { Id: "att1", TaskId: "task1", FileName: "screenshot.png", Url: "" }
          )
      )
    Theme: =PowerAppsTheme
