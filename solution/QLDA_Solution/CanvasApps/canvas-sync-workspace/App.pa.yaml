App:
  Properties:
    Formulas: |-
      =clrBg = RGBA(243, 242, 241, 1);
      clrSurface = RGBA(255, 255, 255, 1);
      clrSurface2 = RGBA(248, 249, 250, 1);
      clrAccent = RGBA(0, 120, 212, 1);
      clrAccentWarm = RGBA(216, 59, 1, 1);
      clrSuccess = RGBA(16, 124, 65, 1);
      clrDanger = RGBA(164, 38, 44, 1);
      clrTextPrimary = RGBA(50, 49, 48, 1);
      clrTextSecondary = RGBA(96, 94, 92, 1);
      clrBorder = RGBA(225, 223, 221, 1);
    OnStart: |-
      =Set(varCurrentUser, User().FullName);
      Set(varEditTask, Blank());
      Set(varSearchText, "");
      Set(varFilterStatus, "All");
      Set(varFilterPriority, "All");
      Set(varFilterAssignee, "All");
      Set(varFilterProject, "All");
      Set(varFilterDueDays, "All");
      Set(varFormError, "");

      ClearCollect(colBuckets,
          { Status: "Todo" },
          { Status: "In Progress" },
          { Status: "Done" }
      );

      ClearCollect(colTasks,
          { Id: "task1", TaskName: "Finalize sprint backlog", ProjectName: "Website Revamp", Department: "Engineering", AssignedToName: "An", Status: "In Progress", Priority: "High", DueDate: Today()+2, Description: "Confirm deliverables with team leads", CreatedAt: Now()-4, CreatedBy: "Admin" },
          { Id: "task2", TaskName: "Department KPI review", ProjectName: "Q2 Sales", Department: "Sales", AssignedToName: "Binh", Status: "Todo", Priority: "High", DueDate: Today()+1, Description: "Prepare KPI risk report", CreatedAt: Now()-3, CreatedBy: "Manager" },
          { Id: "task3", TaskName: "Prepare onboarding checklist", ProjectName: "HR Onboarding", Department: "HR", AssignedToName: "Chi", Status: "Done", Priority: "Medium", DueDate: Today()-1, Description: "Checklist for new hires", CreatedAt: Now()-2, CreatedBy: "Admin" },
          { Id: "task4", TaskName: "Legal review for vendor contract", ProjectName: "Website Revamp", Department: "Operations", AssignedToName: "Dung", Status: "Todo", Priority: "Urgent", DueDate: Today()+3, Description: "Contract review before procurement", CreatedAt: Now()-1, CreatedBy: "Admin" }
      );

      ClearCollect(colFilterStatuses, {Value: "All"});
      ForAll(colBuckets, Collect(colFilterStatuses, {Value: Status}));

      ClearCollect(colFilterPriorities,
          {Value: "All"},
          {Value: "Low"},
          {Value: "Medium"},
          {Value: "High"},
          {Value: "Urgent"}
      );

      ClearCollect(colFilterDueDays,
          {Value: "All"},
          {Value: "Overdue"},
          {Value: "Next 7 days"}
      );

      ClearCollect(colFilterAssignees, {Value: "All"});
      ForAll(Distinct(colTasks, AssignedToName), Collect(colFilterAssignees, {Value: Value}));

      ClearCollect(colFilterProjects, {Value: "All"});
      ForAll(Distinct(colTasks, ProjectName), Collect(colFilterProjects, {Value: Value}));


      ClearCollect(colAuditLog);
      ClearCollect(colComments);
      ClearCollect(colAttachments);

      Set(varDetailTask, Blank())
    Theme: =PowerAppsTheme
