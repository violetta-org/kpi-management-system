name: Deploy Solution to Target (Standard ALM)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Build  # Uses Build environment secrets (ENVIRONMENT_URL = QLDA-Build)
    steps:
    - uses: actions/checkout@v4

    # 1. Install Power Platform CLI tooling
    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1

    # 2. Pack the source files back into an unmanaged solution zip
    - name: Pack Solution (Unmanaged)
      uses: microsoft/powerplatform-actions/pack-solution@v1
      with:
        solution-folder: 'src'
        solution-file: 'out/VibeApp.zip'
        solution-type: 'Unmanaged'

    # 3. Authenticate and Import the unmanaged solution into the Build Environment using direct pac CLI (bypasses admin endpoints)
    - name: Import Solution to Build Env
      run: |
        pac auth create --name "BuildEnv" --applicationId "${{ secrets.CLIENT_ID }}" --clientSecret "${{ secrets.CLIENT_SECRET }}" --tenant "${{ secrets.TENANT_ID }}" --environment "${{ secrets.ENVIRONMENT_URL }}"
        pac solution import --path out/VibeApp.zip --activate-plugins --force-overwrite

    # 4. Export the solution from the Build Environment as Managed using direct pac CLI
    - name: Export Solution from Build Env (Managed)
      run: |
        pac solution export --name "VibeApp" --path "out/VibeApp_managed.zip" --managed --overwrite

    # 5. Upload the Managed Solution zip as a build artifact
    - name: Upload Solution Artifact
      uses: actions/upload-artifact@v4
      with:
        name: managed-solution
        path: out/VibeApp_managed.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: Production  # Uses Production environment secrets (ENVIRONMENT_URL = QLDA-Target)
    steps:
    # 1. Install Power Platform CLI tooling
    - name: Install Power Platform Tools
      uses: microsoft/powerplatform-actions/actions-install@v1

    # 2. Download the managed solution artifact from the build job
    - name: Download Solution Artifact
      uses: actions/download-artifact@v4
      with:
        name: managed-solution
        path: out

    # 3. Authenticate and Import the managed solution into the Target Environment using direct pac CLI
    - name: Import Solution to Target Environment
      run: |
        pac auth create --name "TargetEnv" --applicationId "${{ secrets.CLIENT_ID }}" --clientSecret "${{ secrets.CLIENT_SECRET }}" --tenant "${{ secrets.TENANT_ID }}" --environment "${{ secrets.ENVIRONMENT_URL }}"
        pac solution import --path out/VibeApp_managed.zip --activate-plugins --force-overwrite --publish-changes
